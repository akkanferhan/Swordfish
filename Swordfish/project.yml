name: Swordfish
options:
  bundleIdPrefix: dev.swordfish
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Swordfish:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: DesignSystem
      - path: Services
      - path: Views
      - path: Utilities
      - path: Resources
        excludes:
          - "Info.plist"
          - "Swordfish.entitlements"
    resources:
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Swordfish
        CFBundleDisplayName: Swordfish
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        NSHumanReadableCopyright: "© 2026 Swordfish"
        NSAppleEventsUsageDescription: "Swordfish uses System Events to trigger the Lock Screen keyboard shortcut (⌃⌘Q)."
    entitlements:
      path: Resources/Swordfish.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.swordfish.Swordfish
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
